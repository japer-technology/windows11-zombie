name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-lint-and-smoke:
    name: Windows lint + smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyYAML and jsonschema
        shell: pwsh
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: build.ps1 lint
        shell: pwsh
        run: pwsh -NoProfile -File ./build.ps1 lint

      - name: build.ps1 test (smoke)
        shell: pwsh
        run: pwsh -NoProfile -File ./build.ps1 test

      - name: build.ps1 package
        shell: pwsh
        run: pwsh -NoProfile -File ./build.ps1 package

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows11-zombie-dist
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  secret-scan:
    name: Secret pattern scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Scan for likely committed secrets
        shell: bash
        run: |
          set -e
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|tskey-auth-[A-Za-z0-9_-]{20,})' -- . ':!CHANGELOG.md' ':!.gitleaks.toml' ':!docs/*' ':!tests/*' ':!.cspell.json'; then
            echo 'Likely secret found in repository.' >&2
            exit 1
          fi

  python-tests:
    name: pytest (cross-platform)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest pyyaml jsonschema
      - name: pytest tests/python
        run: python -m pytest tests/python -q

  policy-tool-coverage:
    name: Policy / tool classification guard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pyyaml
      - name: Every tool in TOOL_REGISTRY has a classification
        run: python scripts/check_tool_coverage.py
