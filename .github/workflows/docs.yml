name: Docs

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,403,429
            --exclude-path .git
            './**/*.md'
          fail: true

  spell-check:
    name: Spell check (cspell)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g cspell@^8
      - run: cspell --no-progress --no-summary --gitignore "**/*.md"
        continue-on-error: true
