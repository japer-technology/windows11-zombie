name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 3"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect committed secrets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .gitleaks.toml
