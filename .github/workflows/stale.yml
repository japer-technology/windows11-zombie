name: Stale issues and PRs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-message: >-
            This issue has been inactive for 60 days. It will be closed in
            14 days if there is no further activity. Comment to keep it open.
          stale-pr-message: >-
            This pull request has been inactive for 30 days. It will be
            closed in 14 days if there is no further activity.
          close-issue-message: >-
            Closing due to inactivity. Reopen with a comment if this is
            still relevant.
          close-pr-message: >-
            Closing due to inactivity. Please reopen if you'd like to
            continue the change.
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,wip"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
