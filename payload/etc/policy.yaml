# Windows Zombie default policy.
#
# Action classes:
#   read_only       informational, never mutating; runs automatically.
#   user_change     changes within the agent user's own profile.
#   system_change   package, service, file, or container mutation.
#   network_change  firewall, Tailscale, sshd, RDP, interface mutation.
#   destructive     irreversible mutation; requires confirmation phrase.
#
# Defaults are conservative. Operators may tighten or loosen per class.

settings:
  destructive_confirmation: "yes, I understand this is destructive"
  # Fail-closed default: unknown commands classify at the highest
  # gated class so they cannot auto-run.
  default_class: destructive

# Curated targets pre-classified as ``system_change``. The standard
# approval prompt still fires for these — they do not auto-run — but
# they are not escalated to ``destructive`` by the fail-closed default
# above. Entries are matched against the basename of the program that
# the agent invokes.
sudo_allow_list:
  - winget
  - choco
  - pip
  - npm
  - sc
  - net
  - powershell
  - pwsh
  - Restart-Service
  - Start-Service
  - Stop-Service
  - Set-Service
  - Get-Service
  - New-NetFirewallRule
  - Set-NetFirewallRule
  - Remove-NetFirewallRule
  - tailscale
  - icacls
  - takeown
  - reg
  - bcdedit
  - dism
  - Restart-Computer
  - Stop-Computer

classes:
  read_only:
    approval: auto
    description: Diagnostics and inspection only.
  user_change:
    approval: required
    description: Changes within the agent account's profile or user-owned files.
  system_change:
    approval: required
    description: Package, service, file, or container mutation.
  network_change:
    approval: required
    description: Defender Firewall, Tailscale, RDP, sshd, interface mutation.
  destructive:
    approval: required
    confirm_phrase: true
    description: Irreversible mutation. Requires confirmation phrase.

# Patterns are matched in order against the proposed command string.
# The first matching rule decides the class. Patterns are Python
# regular expressions, matched with re.search().
rules:
  # ----- destructive -----
  - pattern: '\bRemove-Item\b.*-Recurse\b.*\\(Windows|Program Files|ProgramData|Users)\\'
    class: destructive
  - pattern: '\b(rd|rmdir)\b.*\/s.*C:\\'
    class: destructive
  - pattern: '\bFormat-Volume\b'
    class: destructive
  - pattern: '\bClear-Disk\b'
    class: destructive
  - pattern: '\bRemove-Partition\b'
    class: destructive
  - pattern: '\bdiskpart\b'
    class: destructive
  - pattern: '\bcipher\s+/w'
    class: destructive
  - pattern: '\bRemove-LocalUser\b'
    class: destructive
  - pattern: '\bbcdedit\b.*\/(delete|set)'
    class: destructive
  - pattern: '\bdism\b.*\/(remove-package|disable-feature)'
    class: destructive
  - pattern: '\bReset-ComputerMachinePassword\b'
    class: destructive
  - pattern: '\bRemove-CimInstance\b'
    class: destructive
  - pattern: '\bdocker\s+(system\s+prune|volume\s+rm|image\s+prune\s+-a)'
    class: destructive

  # ----- network_change -----
  - pattern: '\b(New|Set|Remove|Disable|Enable)-NetFirewallRule\b'
    class: network_change
  - pattern: '\b(Set|Disable|Enable)-NetFirewallProfile\b'
    class: network_change
  - pattern: '\bnetsh\s+(advfirewall|interface|wlan)'
    class: network_change
  - pattern: '\btailscale\s+(up|down|logout|set)\b'
    class: network_change
  - pattern: '\b(Set|New|Remove)-NetIPAddress\b'
    class: network_change
  - pattern: '\b(Set|New|Remove)-NetRoute\b'
    class: network_change
  - pattern: '\b(Set|Restart|Stop|Start)-Service\b.*\b(sshd|TermService|Tailscale|RemoteAccess|RasMan)\b'
    class: network_change
  - pattern: '\breg\s+(add|delete)\b.*\\Services\\(SharedAccess|TermService|sshd|Tailscale)'
    class: network_change

  # ----- system_change -----
  - pattern: '\bwinget\s+(install|uninstall|upgrade|repair)\b'
    class: system_change
  - pattern: '\bchoco\s+(install|uninstall|upgrade)\b'
    class: system_change
  - pattern: '\b(Install|Uninstall|Update)-Package\b'
    class: system_change
  - pattern: '\b(Install|Uninstall|Update)-Module\b'
    class: system_change
  - pattern: '\b(Start|Stop|Restart|Suspend|Resume)-Service\b'
    class: system_change
  - pattern: '\bSet-Service\b'
    class: system_change
  - pattern: '\bsc(\.exe)?\s+(create|delete|config|start|stop|failure)\b'
    class: system_change
  - pattern: '\b(Register|Unregister|Enable|Disable)-ScheduledTask\b'
    class: system_change
  - pattern: '\bdocker\s+(run|start|stop|restart|rm|build|pull|push|exec)\b'
    class: system_change
  - pattern: '\b(New|Remove|Set)-LocalUser\b'
    class: system_change
  - pattern: '\b(Add|Remove)-LocalGroupMember\b'
    class: system_change
  - pattern: '\b(icacls|takeown)\b'
    class: system_change
  - pattern: '\breg\s+(add|delete|import)\b'
    class: system_change
  - pattern: '\bMove-Item\b'
    class: system_change
  - pattern: '\bRemove-Item\b'
    class: system_change
  # Piping output into an interpreter ≈ arbitrary mutation even when
  # the head of the pipeline is read-only.
  - pattern: '\|\s*(powershell|pwsh|cmd|python|node|bash)\b'
    class: system_change
  - pattern: '\bSet-Content\b.*\\(Windows|Program Files|ProgramData|etc|System32)\\'
    class: system_change

  # ----- user_change -----
  - pattern: '\bgit\s+clone\b'
    class: user_change
  - pattern: '\bgit\s+(pull|fetch|checkout|reset)\b'
    class: user_change
  - pattern: '\bNew-Item\b'
    class: user_change
  - pattern: '\bSet-Location\b'
    class: user_change
  - pattern: '\bpip\s+install\b'
    class: user_change
  - pattern: '\bnpm\s+(install|i|add)\b'
    class: user_change
  - pattern: '\b(Out-File|Set-Content|Add-Content)\b'
    class: user_change
  - pattern: '\bCopy-Item\b'
    class: user_change

  # ----- read_only -----
  - pattern: '^(Get-ChildItem|gci|ls|dir|Get-Content|cat|type|Select-String|sls|Measure-Object|Format-Table|Format-List)\b'
    class: read_only
  - pattern: '^(Get-Process|ps|Get-Service|Get-EventLog|Get-WinEvent|Get-ComputerInfo|Get-CimInstance|Get-WmiObject)\b'
    class: read_only
  - pattern: '^(Get-Item|Get-ItemProperty|Get-Acl|Test-Path|Resolve-Path|Get-Location|pwd)\b'
    class: read_only
  - pattern: '^(Get-NetIPAddress|Get-NetRoute|Get-NetAdapter|Get-NetFirewallProfile|Get-NetFirewallRule|Get-NetTCPConnection|Test-NetConnection|Resolve-DnsName|ping|tracert|nslookup)\b'
    class: read_only
  - pattern: '^(Get-LocalUser|Get-LocalGroup|Get-LocalGroupMember|whoami|hostname)\b'
    class: read_only
  - pattern: '^(winget\s+(list|show|search|source)|choco\s+list)\b'
    class: read_only
  - pattern: '^(docker\s+(ps|images|info|version|logs|inspect|stats)|tailscale\s+status)\b'
    class: read_only
  - pattern: '^(git\s+(status|log|diff|show|branch|remote))\b'
    class: read_only
  - pattern: '^(Get-Variable|Get-Command|Get-Module|Get-Help|Get-Date|Get-TimeZone|Get-Culture)\b'
    class: read_only

# Per-tool class overrides for the closed pi-mono tool registry.
tool_classes: {}

# Per-turn agent budgets that bound runaway loops.
agent:
  max_tool_calls_per_turn: 12
  max_elevated_calls_per_turn: 3
